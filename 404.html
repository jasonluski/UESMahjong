<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f5f0e6" />
  <meta name="color-scheme" content="light" />
  <title>Not Found · UES Mahjong</title>
  <meta name="description" content="The page you're looking for isn't here. Return to uesmahjong.com." />
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@400;500&display=swap" />
  <link rel="stylesheet" href="/style.css" />
  <style>
    .nf {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem 1.5rem;
      gap: 0;
    }
    .nf-eyebrow {
      font-family: var(--font-sans);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--slate);
      margin-bottom: 1rem;
    }
    .nf-title {
      font-family: var(--font-display);
      font-weight: 400;
      font-size: clamp(2.5rem, 7vw, 4.5rem);
      letter-spacing: 0.04em;
      line-height: 1.05;
      margin-bottom: 0.75rem;
    }
    .nf-title em { font-style: italic; color: var(--gold); }
    .nf-line {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 1.25rem;
      color: var(--near-black);
      margin: 1.5rem 0 2.5rem;
    }
    .nf-flourish {
      display: inline-flex; align-items: center; gap: 0.5rem; margin: 0 auto 1.5rem;
    }
    .nf-flourish span.line { width: 40px; height: 1px; background: var(--gold); display: block; }
    .nf-flourish span.dot { width: 5px; height: 5px; background: var(--gold); transform: rotate(45deg); display: block; }
  </style>
</head>
<body>
  <main class="nf">
    <p class="nf-eyebrow">404 · Not Found</p>
    <h1 class="nf-title">This hand isn't <em>on the card</em></h1>
    <div class="nf-flourish" aria-hidden="true">
      <span class="line"></span><span class="dot"></span><span class="line"></span>
    </div>
    <p class="nf-line">The page you're looking for can't be found.</p>
    <a class="btn-book" href="/">Return Home</a>
  </main>
</body>
</html>
