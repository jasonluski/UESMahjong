<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#f5f0e6"/>

  <!-- subtle border -->
  <rect x="30" y="30" width="1140" height="570" fill="none" stroke="#d8d0c0" stroke-width="2"/>

  <!-- brownstone mark, left side -->
  <g transform="translate(140, 235) scale(1.4)">
    <!-- roof -->
    <path d="M0 50 L70 0 L140 50 Z" fill="none" stroke="#1a1815" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- body -->
    <rect x="15" y="50" width="110" height="110" fill="none" stroke="#1a1815" stroke-width="2.5"/>
    <!-- door -->
    <rect x="58" y="95" width="24" height="65" fill="none" stroke="#1a1815" stroke-width="2.5"/>
    <!-- windows -->
    <rect x="28" y="70" width="18" height="18" fill="none" stroke="#1a1815" stroke-width="2"/>
    <rect x="94" y="70" width="18" height="18" fill="none" stroke="#1a1815" stroke-width="2"/>
    <rect x="28" y="100" width="18" height="18" fill="none" stroke="#1a1815" stroke-width="2"/>
    <rect x="94" y="100" width="18" height="18" fill="none" stroke="#1a1815" stroke-width="2"/>
    <rect x="28" y="130" width="18" height="18" fill="none" stroke="#1a1815" stroke-width="2"/>
    <rect x="94" y="130" width="18" height="18" fill="none" stroke="#1a1815" stroke-width="2"/>
    <!-- gold dot -->
    <circle cx="70" cy="25" r="4" fill="#c9a254"/>
  </g>

  <!-- text block, right side -->
  <text x="500" y="230" font-family="Georgia, 'Cormorant Garamond', serif" font-size="36" font-weight="400" fill="#8fa3b1" letter-spacing="8">UES · MAHJONG</text>

  <text x="500" y="350" font-family="Georgia, 'Cormorant Garamond', serif" font-style="italic" font-size="82" font-weight="600" fill="#1a1815">American Mahjong</text>
  <text x="500" y="430" font-family="Georgia, 'Cormorant Garamond', serif" font-style="italic" font-size="82" font-weight="600" fill="#1a1815">Lessons in NYC</text>

  <line x1="500" y1="460" x2="600" y2="460" stroke="#c9a254" stroke-width="3"/>

  <text x="500" y="510" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="300" fill="#1a1815" letter-spacing="2">Upper East Side · Private &amp; Group</text>
</svg>
